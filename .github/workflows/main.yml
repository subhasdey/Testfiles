name: Regi Compliance Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compliance-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      BACKEND_URL: ${{ secrets.BACKEND_URL }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Submit compliance analysis
        id: submit
        run: |
          ASYNC_ID="async-${{ github.run_id }}-${{ github.run_attempt }}"

          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${BACKEND_URL}/analyze-async" \
            -H "Content-Type: application/json" \
            -d "{
              \"git_url\": \"https://github.com/${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"language\": \"javascript\",
              \"sector_name\": \"Payment Card Industry\",
              \"sector_framework\": \"PCI DSS\",
              \"level\": \"LEVEL_1\",
              \"async_id\": \"${ASYNC_ID}\"
            }")

          echo "Submit HTTP status: $HTTP_CODE"
          cat /tmp/response.json

          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "::error::Submission failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "ASYNC_ID=$ASYNC_ID" >> $GITHUB_OUTPUT

      - name: Wait for analysis to complete
        run: sleep 60

      - name: Fetch results
        run: |
          ASYNC_ID="${{ steps.submit.outputs.ASYNC_ID }}"

          HTTP_CODE=$(curl -s -o /tmp/result.json -w "%{http_code}" \
            -X GET "${BACKEND_URL}/results/${ASYNC_ID}")

          echo "HTTP status: $HTTP_CODE"
          cat /tmp/result.json

          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "::error::Failed to fetch results with HTTP $HTTP_CODE"
            exit 1
          fi

          # Parse response — backend may return results directly or embed them
          # in a .message field as stringified JSON (rule-keyed format).
          python3 << 'PYEOF'
          import json, sys, os

          with open('/tmp/result.json') as f:
            data = json.load(f)

          # Normalize status
          raw_status = str(data.get('status') or data.get('state') or 'unknown').lower()
          status_map = {'processed': 'Completed', 'done': 'Completed', 'complete': 'Completed',
                        'completed': 'Completed', 'success': 'Completed',
                        'failed': 'Failed', 'error': 'Failed',
                        'pending': 'Pending', 'processing': 'Processing'}
          STATUS = status_map.get(raw_status, raw_status.capitalize())

          SCORE = 'N/A'
          findings_list = []
          total_rules = 0
          violated_rules = 0

          # Shape 1: .message is stringified JSON with rule-keyed structure
          # { "RULE-ID": { requirement, evaluated_matches: [{issue_summary, fix_summary, filename, ...}] } }
          message = data.get('message', '')
          if isinstance(message, str) and message.strip().startswith('{'):
            try:
              msg = json.loads(message)
              for rule_id, val in msg.items():
                if not isinstance(val, dict):
                  continue
                total_rules += 1
                matches = val.get('evaluated_matches') or []
                rule_has_violation = False
                for m in matches:
                  if not isinstance(m, dict):
                    continue
                  issue = m.get('issue_summary') or m.get('issue') or ''
                  fix   = m.get('fix_summary')   or m.get('fix')   or ''
                  # A match is a finding if it has an issue description
                  if issue:
                    rule_has_violation = True
                    findings_list.append({
                      'rule':    rule_id,
                      'message': issue,
                      'fix':     fix,
                      'file':    m.get('filename', ''),
                      'lines':   m.get('code_lines', ''),
                    })
                if rule_has_violation:
                  violated_rules += 1
              # Score: % of rules that are compliant
              if total_rules > 0:
                compliant_pct = round(((total_rules - violated_rules) / total_rules) * 100)
                SCORE = f'{compliant_pct}%'
              if 'complianceScore' in msg:
                SCORE = msg['complianceScore']
            except Exception as e:
              print(f'::warning::Could not parse message JSON: {e}')

          # Shape 2: top-level or nested results/result/data
          if not findings_list:
            results = data.get('results') or data.get('result') or data.get('data') or {}
            if isinstance(results, dict):
              raw_findings = results.get('findings') or results.get('issues') or []
              if isinstance(raw_findings, list):
                findings_list = raw_findings
              if SCORE == 'N/A':
                SCORE = results.get('complianceScore') or results.get('compliance_score') or 'N/A'

          # Shape 3: top-level findings/score
          if not findings_list:
            raw_findings = data.get('findings') or []
            if isinstance(raw_findings, list):
              findings_list = raw_findings
          if SCORE == 'N/A':
            SCORE = data.get('complianceScore') or data.get('compliance_score') or 'N/A'

          FINDINGS = len(findings_list)
          print(f'Status: {STATUS} | Score: {SCORE} | Findings: {FINDINGS} | Rules checked: {total_rules}')

          summary = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if summary:
            with open(summary, 'a') as f:
              f.write('## Compliance Scan Results\n')
              f.write('| | |\n|-|-|\n')
              f.write(f'| Status        | {STATUS} |\n')
              f.write(f'| Score         | {SCORE} |\n')
              f.write(f'| Rules Checked | {total_rules} |\n')
              f.write(f'| Violations    | {FINDINGS} |\n')
              if FINDINGS > 0:
                f.write('\n### Violations\n')
                for i, finding in enumerate(findings_list[:15], 1):
                  if isinstance(finding, dict):
                    rule = finding.get('rule', '')
                    msg  = finding.get('message', '')
                    fix  = finding.get('fix', '')
                    file_info = finding.get('file', '')
                    lines = finding.get('lines', '')
                    loc = f' — `{file_info}` lines {lines}' if file_info else ''
                    f.write(f'\n**{i}. `{rule}`**{loc}\n')
                    f.write(f'- **Issue:** {msg}\n')
                    if fix:
                      f.write(f'- **Fix:** {fix}\n')
                if FINDINGS > 15:
                  f.write(f'\n_...and {FINDINGS - 15} more violations._\n')

          if STATUS == 'Failed':
            sys.exit(1)
          PYEOF
