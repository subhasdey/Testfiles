name: Regi Compliance Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compliance-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Submit compliance analysis
        id: submit
        run: |
          RESPONSE=$(curl -s -X POST https://www.regiagents.com/api/v1/analyze \
            -H "Authorization: Bearer ${{ secrets.REGI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "framework": "pci",
              "git_url": "https://github.com/${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "language": "javascript"
            }')
          echo "ASYNC_ID=$(echo $RESPONSE | jq -r '.data.async_id')" >> $GITHUB_OUTPUT
          echo "POLL_AFTER=$(echo $RESPONSE | jq -r '.data.poll_after_seconds')" >> $GITHUB_OUTPUT

      - name: Wait for analysis
        run: sleep ${{ steps.submit.outputs.POLL_AFTER }}

      - name: Fetch results
        run: |
          RESULT=$(curl -s "https://www.regiagents.com/api/v1/results/${{ steps.submit.outputs.ASYNC_ID }}?framework=pci" \
            -H "Authorization: Bearer ${{ secrets.REGI_API_KEY }}")
          STATUS=$(echo $RESULT | jq -r '.data.status')
          SCORE=$(echo $RESULT | jq -r '.data.results.complianceScore // "N/A"')
          FINDINGS=$(echo $RESULT | jq -r '.data.results.findings | length')
          echo "## Compliance Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|-|-|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Score | $SCORE |" >> $GITHUB_STEP_SUMMARY
          echo "| Findings | $FINDINGS |" >> $GITHUB_STEP_SUMMARY
