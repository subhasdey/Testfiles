name: Regi Compliance Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compliance-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      BACKEND_URL: "https://regi-backend-service-226630681778.us-central1.run.app"
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Submit compliance analysis
        id: submit
        run: |
          ASYNC_ID="async-${{ github.run_id }}-${{ github.run_attempt }}"

          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${BACKEND_URL}/analyze-async" \
            -H "Content-Type: application/json" \
            -d "{
              \"git_url\": \"https://github.com/${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"language\": \"javascript\",
              \"sector_name\": \"Payment Card Industry\",
              \"sector_framework\": \"PCI DSS\",
              \"level\": \"LEVEL_1\",
              \"async_id\": \"${ASYNC_ID}\"
            }")

          echo "Submit HTTP status: $HTTP_CODE"
          cat /tmp/response.json

          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "::error::Submission failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "ASYNC_ID=$ASYNC_ID" >> $GITHUB_OUTPUT

      - name: Wait and fetch results
        run: |
          ASYNC_ID="${{ steps.submit.outputs.ASYNC_ID }}"
          MAX_ATTEMPTS=20
          SLEEP_SEC=30

          echo "Waiting 30s before first poll..."
          sleep 30

          STATUS=""

          for i in $(seq 1 $MAX_ATTEMPTS); do
            HTTP_CODE=$(curl -s -o /tmp/result.json -w "%{http_code}" \
              -X GET "${BACKEND_URL}/results/${ASYNC_ID}")

            echo "Attempt $i: HTTP $HTTP_CODE"
            cat /tmp/result.json

            if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
              echo "::warning::Attempt $i: HTTP $HTTP_CODE, retrying in ${SLEEP_SEC}s..."
              sleep $SLEEP_SEC
              continue
            fi

            STATUS=$(jq -r '.status // .data.status // "unknown"' /tmp/result.json)

            if [[ "$STATUS" == "completed" || "$STATUS" == "done" || "$STATUS" == "failed" ]]; then
              break
            fi

            echo "Attempt $i: status=$STATUS, retrying in ${SLEEP_SEC}s..."
            sleep $SLEEP_SEC
          done

          echo "Final status: $STATUS"
          echo "Full result:"
          cat /tmp/result.json

          if [[ "$STATUS" == "failed" ]]; then
            echo "::error::Compliance scan failed"
            exit 1
          fi

          if [[ "$STATUS" != "completed" && "$STATUS" != "done" ]]; then
            echo "::error::Compliance scan did not complete (final status: $STATUS)"
            exit 1
          fi

          SCORE=$(jq -r '.complianceScore // .data.results.complianceScore // .data.complianceScore // "N/A"' /tmp/result.json)
          FINDINGS=$(jq -r 'if .findings then (.findings | length) elif .data.results.findings then (.data.results.findings | length) else 0 end' /tmp/result.json)

          echo "## Compliance Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|-|-|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Score | $SCORE |" >> $GITHUB_STEP_SUMMARY
          echo "| Findings | $FINDINGS |" >> $GITHUB_STEP_SUMMARY

          if [[ "$SCORE" != "N/A" ]] && (( $(echo "$SCORE < 80" | bc -l) )); then
            echo "::error::Compliance score $SCORE is below the required threshold of 80"
            exit 1
          fi

          if [[ "$FINDINGS" -gt 0 ]]; then
            echo "::warning::$FINDINGS compliance finding(s) detected — review the full report"
          fi
