import time, requests

API_KEY = "regi_live_8db1903e38b0d94410f20321328587071860d1aab516b14d"
BASE    = "https://www.regiagents.com"
HEADERS = {"Authorization": f"Bearer {API_KEY}"}

def analyze_repo(git_url: str, framework: str = "pci") -> dict:
    # 1. Submit
    res = requests.post(f"{BASE}/api/v1/analyze",
        headers={**HEADERS, "Content-Type": "application/json"},
        json={"framework": framework, "git_url": git_url, "language": "python"},
    )
    data = res.json()["data"]
    print(f"Submitted: {data['async_id']}")

    # 2. Poll
    time.sleep(data.get("poll_after_seconds", 120))
    while True:
        poll = requests.get(
            f"{BASE}/api/v1/results/{data['async_id']}?framework={framework}",
            headers=HEADERS,
        )
        result = poll.json()["data"]
        if result["status"] in ("completed", "failed"):
            return result
        time.sleep(result.get("retry_after_seconds", 30))

print(analyze_repo("https://github.com/your-org/your-repo"))
