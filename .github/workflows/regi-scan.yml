name: Regi Compliance Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compliance-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.BACKEND_URL }}" ]; then
            echo "::error::BACKEND_URL secret is not set."
            echo "::error::Go to repo Settings → Secrets and variables → Actions → New repository secret"
            echo "::error::Name: BACKEND_URL"
            echo "::error::Value: https://regi-backend-service-226630681778.us-central1.run.app"
            exit 1
          fi

      - name: Detect primary language
        id: detect_lang
        run: |
          cat > /tmp/detect_lang.py << 'PYEOF'
          import json, sys
          langs = json.load(sys.stdin)
          mapping = {
              'Python': 'python',
              'JavaScript': 'javascript',
              'TypeScript': 'javascript',
              'Java': 'java',
              'Go': 'javascript',
              'Ruby': 'javascript',
          }
          top = max(langs, key=langs.get) if langs else 'JavaScript'
          print(mapping.get(top, 'javascript'))
          PYEOF
          RAW_LANG=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/languages" \
            | python3 /tmp/detect_lang.py)
          echo "Detected language: $RAW_LANG"
          echo "LANGUAGE=$RAW_LANG" >> $GITHUB_OUTPUT

      - name: Run all compliance frameworks
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          GIT_URL: "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          BRANCH: ${{ github.ref_name }}
          LANGUAGE: ${{ steps.detect_lang.outputs.LANGUAGE }}
          RUN_PREFIX: "async-${{ github.run_id }}-${{ github.run_attempt }}"
        run: |
          cat > /tmp/build_payload.py << 'PYEOF'
          import json, os, sys
          key             = sys.argv[1]
          sector_name     = sys.argv[2]
          sector_framework= sys.argv[3]
          payload = {
              "git_url":          os.environ["GIT_URL"],
              "branch":           os.environ["BRANCH"],
              "language":         os.environ.get("LANGUAGE", "javascript"),
              "sector_name":      sector_name,
              "sector_framework": sector_framework,
              "level":            "LEVEL_1",
              "async_id":         f"{os.environ['RUN_PREFIX']}-{key}",
          }
          with open(f"/tmp/payload_{key}.json", "w") as f:
              json.dump(payload, f)
          PYEOF

          cat > /tmp/check_status.py << 'PYEOF'
          import json, sys
          key = sys.argv[1]
          try:
              d = json.load(open(f"/tmp/result_{key}.json"))
              s = str(d.get("status", d.get("state", "unknown"))).lower()
              msg = d.get("message", "")
              if isinstance(msg, str) and msg.strip().startswith("{"):
                  try:
                      p = json.loads(msg)
                      if any(isinstance(v, dict) and "evaluated_matches" in v for v in p.values()):
                          s = "processed"
                  except: pass
              print(s)
          except Exception as e:
              print("unknown")
          PYEOF

          FRAMEWORKS=(
            "pci_dss|Payment Card Industry|PCI DSS"
            "soc2|Service Operations|SOC 2"
            "iso27001|Information Security|ISO 27001"
            "sox|Financial Reporting|SOX"
            "asc606|Revenue Recognition|ASC 606"
          )

          echo "=== Submitting all compliance frameworks ==="
          for FW in "${FRAMEWORKS[@]}"; do
            KEY=$(echo "$FW" | cut -d'|' -f1)
            SECTOR_NAME=$(echo "$FW" | cut -d'|' -f2)
            FRAMEWORK=$(echo "$FW" | cut -d'|' -f3)
            python3 /tmp/build_payload.py "$KEY" "$SECTOR_NAME" "$FRAMEWORK"
            HTTP_CODE=$(curl -s -o /tmp/response_${KEY}.json -w "%{http_code}" \
              -X POST "${BACKEND_URL}/analyze-async" \
              -H "Content-Type: application/json" \
              -d @/tmp/payload_${KEY}.json)
            echo "[$FRAMEWORK] Submit HTTP: $HTTP_CODE"
            if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
              echo "::warning::[$FRAMEWORK] Submission failed with HTTP $HTTP_CODE"
            fi
          done

          echo "Waiting 90s for analyses to start processing..."
          sleep 90

          MAX_ATTEMPTS=15
          INTERVAL=30

          for FW in "${FRAMEWORKS[@]}"; do
            KEY=$(echo "$FW" | cut -d'|' -f1)
            FRAMEWORK=$(echo "$FW" | cut -d'|' -f3)
            ASYNC_ID="${RUN_PREFIX}-${KEY}"
            echo "=== Polling $FRAMEWORK (${ASYNC_ID}) ==="
            for ATTEMPT in $(seq 1 $MAX_ATTEMPTS); do
              HTTP_CODE=$(curl -s -o /tmp/result_${KEY}.json -w "%{http_code}" \
                -X GET "${BACKEND_URL}/results/${ASYNC_ID}")
              STATUS=$(python3 /tmp/check_status.py "$KEY" 2>/dev/null || echo "unknown")
              echo "  Attempt $ATTEMPT/$MAX_ATTEMPTS — HTTP $HTTP_CODE — Status: $STATUS"
              case "$STATUS" in
                completed|processed|done|success)
                  echo "  [$FRAMEWORK] Complete."
                  break ;;
                failed|error)
                  echo "  ::warning::[$FRAMEWORK] Returned failed status"
                  break ;;
              esac
              if [[ $ATTEMPT -lt $MAX_ATTEMPTS ]]; then sleep $INTERVAL; fi
            done
          done
          echo "All frameworks polled."

      - name: Parse and summarize results
        run: |
          cat > /tmp/summary.py << 'PYEOF'
          import json, sys, os
          
          FRAMEWORKS = [
              ("pci_dss",  "PCI DSS"),
              ("soc2",     "SOC 2"),
              ("iso27001", "ISO 27001"),
              ("sox",      "SOX"),
              ("asc606",   "ASC 606"),
          ]
          
          def normalize_status(raw):
              s = str(raw or "unknown").lower()
              m = {
                  "processed": "Completed", "done": "Completed", "complete": "Completed",
                  "completed": "Completed", "success": "Completed",
                  "failed": "Failed", "error": "Failed",
                  "pending": "Pending", "processing": "Processing",
              }
              return m.get(s, s.capitalize())
          
          def extract(rule_dict):
              findings, all_files, total, violated = [], set(), 0, 0
              for rule_id, val in rule_dict.items():
                  if not isinstance(val, dict): continue
                  total += 1
                  rule_hit = False
                  for match in (val.get("evaluated_matches") or []):
                      if not isinstance(match, dict): continue
                      fname = match.get("filename", "")
                      if fname: all_files.add(fname)
                      issue = match.get("issue_summary") or match.get("issue") or ""
                      fix   = match.get("fix_summary")   or match.get("fix")   or ""
                      if issue:
                          rule_hit = True
                          findings.append({"rule": rule_id, "issue": issue, "fix": fix,
                                           "file": fname, "lines": match.get("code_lines", "")})
                  if rule_hit: violated += 1
              score = f"{round(((total-violated)/total)*100)}%" if total > 0 else "N/A"
              return findings, total, violated, score, sorted(all_files)
          
          def parse_file(key):
              path = f"/tmp/result_{key}.json"
              if not os.path.exists(path):
                  return {"status": "Not Run", "score": "N/A", "total": 0,
                          "violated": 0, "findings": [], "files": []}
              try:
                  data = json.load(open(path))
              except Exception:
                  return {"status": "Parse Error", "score": "N/A", "total": 0,
                          "violated": 0, "findings": [], "files": []}
              status = normalize_status(data.get("status") or data.get("state"))
              findings, total, violated, score, files = [], 0, 0, "N/A", []
              # Shape 0: rule-keyed at top level
              findings, total, violated, score, files = extract(data)
              # Shape 1: stringified JSON in .message
              if not findings:
                  msg = data.get("message", "")
                  if isinstance(msg, str) and msg.strip().startswith("{"):
                      try:
                          mj = json.loads(msg)
                          findings, total, violated, score, files = extract(mj)
                          if "complianceScore" in mj: score = str(mj["complianceScore"])
                      except: pass
              # Shape 2: nested under result/data/output
              if not findings:
                  for k in ("result", "data", "output"):
                      n = data.get(k)
                      if isinstance(n, dict):
                          findings, total, violated, score, files = extract(n)
                          if findings: break
              # Shape 3: flat list
              if not findings:
                  nested = data.get("results") or data.get("result") or data.get("data") or {}
                  if isinstance(nested, dict):
                      raw = nested.get("findings") or nested.get("issues") or []
                      if isinstance(raw, list): findings = raw
                      if score == "N/A":
                          score = str(nested.get("complianceScore") or nested.get("compliance_score") or "N/A")
              if not findings:
                  raw = data.get("findings") or []
                  if isinstance(raw, list): findings = raw
              if score == "N/A":
                  score = str(data.get("complianceScore") or data.get("compliance_score") or "N/A")
              return {"status": status, "score": score, "total": total,
                      "violated": violated, "findings": findings, "files": files}
          
          # ── Build output ────────────────────────────────────────────────────────────
          results = {key: parse_file(key) for key, _ in FRAMEWORKS}
          
          total_violations = sum(len(r["findings"]) for r in results.values())
          print(f"Total violations across all frameworks: {total_violations}")
          for key, label in FRAMEWORKS:
              r = results[key]
              print(f"  {label}: {r['status']} | Score={r['score']} | Rules={r['total']} | Violations={len(r['findings'])}")
          
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if not summary_path:
              print("::warning::GITHUB_STEP_SUMMARY not set", file=sys.stderr)
              sys.exit(0)
          
          out = []
          out.append("## Regi Compliance Scan Results\n\n")
          
          # Overview table
          out.append("| Framework | Status | Score | Rules Checked | Violations |\n")
          out.append("|---|---|---|---|---|\n")
          for key, label in FRAMEWORKS:
              r = results[key]
              status_icon = "✅" if r["status"] == "Completed" and len(r["findings"]) == 0 else \
                            "⚠️" if r["status"] == "Completed" else \
                            "❌" if r["status"] in ("Failed", "Parse Error") else "⏳"
              out.append(f"| **{label}** | {status_icon} {r['status']} | {r['score']} | {r['total']} | {len(r['findings'])} |\n")
          out.append("\n")
          
          # Per-framework violation details
          any_violations = False
          for key, label in FRAMEWORKS:
              r = results[key]
              if not r["findings"]: continue
              any_violations = True
              out.append(f"---\n\n### {label} — Violations\n\n")
              for idx, finding in enumerate(r["findings"][:15], 1):
                  if isinstance(finding, dict):
                      rule      = finding.get("rule", "Unknown rule")
                      issue_txt = finding.get("issue") or finding.get("message") or ""
                      fix_txt   = finding.get("fix") or finding.get("recommendation") or ""
                      fname     = finding.get("file", "")
                      lines     = finding.get("lines", "")
                      loc_str   = f"`{fname}` lines {lines}" if fname else ""
                  else:
                      rule, issue_txt, fix_txt, loc_str = str(finding), "", "", ""
                  out.append(f"#### {idx}. `{rule}`\n\n")
                  if loc_str:   out.append(f"- **File:** {loc_str}\n")
                  if issue_txt: out.append(f"- **Issue:** {issue_txt}\n")
                  if fix_txt:   out.append(f"- **Fix:** {fix_txt}\n")
                  out.append("\n")
              extra = len(r["findings"]) - 15
              if extra > 0: out.append(f"> *{extra} more violations not shown.*\n\n")
          
          if not any_violations:
              out.append("> ✅ No violations found across all frameworks. Repository is fully compliant.\n")
          
          with open(summary_path, "w") as f:
              f.writelines(out)
          print(f"Summary written ({len(out)} lines)")
          PYEOF
          python3 /tmp/summary.py
