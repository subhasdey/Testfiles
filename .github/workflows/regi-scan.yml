name: Regi Compliance Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compliance-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.BACKEND_URL }}" ]; then
            echo "::error::BACKEND_URL secret is not set."
            echo "::error::Go to repo Settings → Secrets and variables → Actions → New repository secret"
            echo "::error::Name: BACKEND_URL"
            echo "::error::Value: https://regi-backend-service-226630681778.us-central1.run.app"
            exit 1
          fi

      - name: Detect primary language
        id: detect_lang
        run: |
          cat > /tmp/detect_lang.py << 'PYEOF'
          import json, sys
          langs = json.load(sys.stdin)
          mapping = {
              'Python': 'python',
              'JavaScript': 'javascript',
              'TypeScript': 'javascript',
              'Java': 'java',
              'Go': 'javascript',
              'Ruby': 'javascript',
          }
          top = max(langs, key=langs.get) if langs else 'JavaScript'
          print(mapping.get(top, 'javascript'))
          PYEOF
          RAW_LANG=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/languages" \
            | python3 /tmp/detect_lang.py)
          echo "Detected language: $RAW_LANG"
          echo "LANGUAGE=$RAW_LANG" >> $GITHUB_OUTPUT

      - name: Submit PCI DSS compliance analysis
        id: submit
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          ASYNC_ID="async-${{ github.run_id }}-${{ github.run_attempt }}"
          LANGUAGE="${{ steps.detect_lang.outputs.LANGUAGE }}"

          # Write payload to temp file to avoid shell escaping issues
          python3 - << 'PYEOF'
          import json, os
          payload = {
            "git_url":          "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}",
            "branch":           "${{ github.ref_name }}",
            "language":         os.environ.get("LANGUAGE", "javascript"),
            "sector_name":      "Payment Card Industry",
            "sector_framework": "PCI DSS",
            "level":            "LEVEL_1",
            "async_id":         "async-${{ github.run_id }}-${{ github.run_attempt }}",
          }
          with open("/tmp/payload.json", "w") as f:
            json.dump(payload, f)
          PYEOF

          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${BACKEND_URL}/analyze-async" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json)

          echo "Submit HTTP status: $HTTP_CODE"
          cat /tmp/response.json

          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "::error::Submission failed with HTTP $HTTP_CODE — check BACKEND_URL secret"
            exit 1
          fi
          echo "ASYNC_ID=$ASYNC_ID" >> $GITHUB_OUTPUT

      - name: Fetch results
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          ASYNC_ID="${{ steps.submit.outputs.ASYNC_ID }}"

          cat > /tmp/check_status.py << 'PYEOF'
          import json, sys
          with open('/tmp/result.json') as f:
              d = json.load(f)
          s = str(d.get('status', d.get('state', 'unknown'))).lower()
          msg = d.get('message', '')
          if isinstance(msg, str) and msg.strip().startswith('{'):
              try:
                  parsed = json.loads(msg)
                  if any(isinstance(v, dict) and 'evaluated_matches' in v for v in parsed.values()):
                      s = 'processed'
              except:
                  pass
          print(s)
          PYEOF

          echo "Waiting 60s for initial analysis..."
          sleep 60

          MAX_ATTEMPTS=10
          INTERVAL=30
          COMPLETED=0

          for ATTEMPT in $(seq 1 $MAX_ATTEMPTS); do
            echo "Fetch attempt $ATTEMPT/$MAX_ATTEMPTS"
            HTTP_CODE=$(curl -s -o /tmp/result.json -w "%{http_code}" \
              -X GET "${BACKEND_URL}/results/${ASYNC_ID}")
            echo "  HTTP $HTTP_CODE"

            if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
              echo "::warning::Fetch attempt $ATTEMPT returned HTTP $HTTP_CODE"
              sleep $INTERVAL
              continue
            fi

            STATUS=$(python3 /tmp/check_status.py 2>/dev/null || echo "unknown")
            echo "  Status: $STATUS"

            case "$STATUS" in
              completed|processed|done|success)
                COMPLETED=1
                echo "Analysis complete."
                break ;;
              failed|error)
                echo "::warning::Analysis returned a failed status"
                COMPLETED=1
                break ;;
            esac

            echo "  Still processing, waiting ${INTERVAL}s..."
            sleep $INTERVAL
          done

          if [[ "$COMPLETED" -eq 0 ]]; then
            echo "::warning::Analysis did not finish after $MAX_ATTEMPTS attempts — results may be incomplete"
          fi

      - name: Parse and summarize results
        run: |
          cat > /tmp/parse_results.py << 'PYEOF'
          import json, sys, os
          
          def normalize_status(raw):
              s = str(raw or "unknown").lower()
              mapping = {
                  "processed": "Completed", "done": "Completed",
                  "complete": "Completed", "completed": "Completed", "success": "Completed",
                  "failed": "Failed", "error": "Failed",
                  "pending": "Pending", "processing": "Processing",
              }
              return mapping.get(s, s.capitalize())
          
          def extract_from_rule_keyed(rule_dict):
              findings = []
              all_files = set()
              total = 0
              violated = 0
              for rule_id, val in rule_dict.items():
                  if not isinstance(val, dict):
                      continue
                  total += 1
                  rule_violated = False
                  for match in (val.get("evaluated_matches") or []):
                      if not isinstance(match, dict):
                          continue
                      fname = match.get("filename", "")
                      if fname:
                          all_files.add(fname)
                      issue = match.get("issue_summary") or match.get("issue") or ""
                      fix   = match.get("fix_summary")   or match.get("fix")   or ""
                      if issue:
                          rule_violated = True
                          findings.append({
                              "rule":  rule_id,
                              "issue": issue,
                              "fix":   fix,
                              "file":  fname,
                              "lines": match.get("code_lines", ""),
                          })
                  if rule_violated:
                      violated += 1
              score = f"{round(((total - violated) / total) * 100)}%" if total > 0 else "N/A"
              return findings, total, violated, score, sorted(all_files)
          
          with open("/tmp/result.json") as fh:
              data = json.load(fh)
          
          status         = normalize_status(data.get("status") or data.get("state"))
          findings       = []
          reviewed_files = []
          total_rules    = 0
          violated_rules = 0
          score          = "N/A"
          
          # Shape 0: rule-keyed at top level
          findings, total_rules, violated_rules, score, reviewed_files = extract_from_rule_keyed(data)
          
          # Shape 1: rule-keyed inside .message as stringified JSON
          if not findings:
              message_raw = data.get("message", "")
              if isinstance(message_raw, str) and message_raw.strip().startswith("{"):
                  try:
                      message_json = json.loads(message_raw)
                      findings, total_rules, violated_rules, score, reviewed_files = extract_from_rule_keyed(message_json)
                      if "complianceScore" in message_json:
                          score = str(message_json["complianceScore"])
                  except Exception as exc:
                      print(f"::warning::Could not parse message JSON: {exc}", file=sys.stderr)
          
          # Shape 2: rule-keyed under result/data/output
          if not findings:
              for _key in ("result", "data", "output"):
                  _nested = data.get(_key)
                  if isinstance(_nested, dict):
                      findings, total_rules, violated_rules, score, reviewed_files = extract_from_rule_keyed(_nested)
                      if findings:
                          break
          
          # Shape 3: flat findings list
          if not findings:
              nested = data.get("results") or data.get("result") or data.get("data") or {}
              if isinstance(nested, dict):
                  raw = nested.get("findings") or nested.get("issues") or []
                  if isinstance(raw, list):
                      findings = raw
                  if score == "N/A":
                      score = str(nested.get("complianceScore") or nested.get("compliance_score") or "N/A")
          
          if not findings:
              raw = data.get("findings") or []
              if isinstance(raw, list):
                  findings = raw
          
          if score == "N/A":
              score = str(data.get("complianceScore") or data.get("compliance_score") or "N/A")
          
          total_findings = len(findings)
          print(f"Status={status} | Score={score} | Rules={total_rules} | Violations={total_findings}")
          
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if not summary_path:
              print("::warning::GITHUB_STEP_SUMMARY not set", file=sys.stderr)
              sys.exit(0)
          
          out = []
          out.append("## PCI DSS Compliance Scan Results\n\n")
          out.append("| Field | Value |\n")
          out.append("|---|---|\n")
          out.append(f"| **Status** | {status} |\n")
          out.append(f"| **Compliance Score** | {score} |\n")
          out.append(f"| **Rules Checked** | {total_rules} |\n")
          out.append(f"| **Violations Found** | {total_findings} |\n")
          out.append(f"| **Files Reviewed** | {len(reviewed_files)} |\n")
          
          if reviewed_files:
              out.append("\n---\n\n### Files Reviewed\n\n")
              for f in reviewed_files:
                  out.append(f"- `{f}`\n")
          
          if total_findings > 0:
              out.append("\n---\n\n### Violation Details\n\n")
              for idx, finding in enumerate(findings[:20], 1):
                  if isinstance(finding, dict):
                      rule       = finding.get("rule", "Unknown rule")
                      issue_txt  = finding.get("issue") or finding.get("message") or ""
                      fix_txt    = finding.get("fix") or finding.get("recommendation") or ""
                      file_name  = finding.get("file", "")
                      code_lines = finding.get("lines", "")
                      loc_str    = f"`{file_name}` lines {code_lines}" if file_name else ""
                  else:
                      rule, issue_txt, fix_txt, loc_str = str(finding), "", "", ""
                  out.append(f"#### {idx}. `{rule}`\n\n")
                  if loc_str:   out.append(f"- **File:** {loc_str}\n")
                  if issue_txt: out.append(f"- **Issue:** {issue_txt}\n")
                  if fix_txt:   out.append(f"- **Fix:** {fix_txt}\n")
                  out.append("\n")
              if total_findings > 20:
                  out.append(f"> *{total_findings - 20} more violations not shown.*\n")
          else:
              out.append("\n> ✅ No violations found. Repository is compliant.\n")
          
          with open(summary_path, "w") as f:
              f.writelines(out)
          
          print(f"Summary written ({len(out)} lines)")
          if status in ("Pending", "Processing"):
              print("::warning::Analysis still pending — results may be incomplete", file=sys.stderr)
          elif status == "Failed":
              sys.exit(1)
          PYEOF
          python3 /tmp/parse_results.py

      - name: Create remediation PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          cat > /tmp/create_pr.py << 'PYEOF'
          import json, os, sys, urllib.request, urllib.error, subprocess
          from pathlib import Path
          from collections import defaultdict

          WORKSPACE = Path(os.environ.get("GITHUB_WORKSPACE", "."))

          def gh_api(method, path, body=None):
              url = f"https://api.github.com/repos/{path}"
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(url, data=data, method=method, headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
              })
              try:
                  with urllib.request.urlopen(req) as r:
                      b = r.read(); return json.loads(b) if b else {}
              except urllib.error.HTTPError as e:
                  b = e.read(); return json.loads(b) if b else {}

          def run_git(cmd):
              return subprocess.run(cmd, shell=True, capture_output=True, text=True, cwd=WORKSPACE)

          def extract(rule_dict):
              out = []
              for rule_id, val in rule_dict.items():
                  if not isinstance(val, dict): continue
                  for match in (val.get("evaluated_matches") or []):
                      if not isinstance(match, dict): continue
                      issue = match.get("issue_summary") or match.get("issue") or ""
                      fix   = match.get("fix_summary") or match.get("fix") or ""
                      if issue:
                          out.append({"rule": rule_id, "issue": issue, "fix": fix,
                                      "file": match.get("filename",""), "lines": match.get("code_lines","")})
              return out

          try: data = json.load(open("/tmp/result.json"))
          except Exception: sys.exit(0)

          findings = extract(data)
          if not findings:
              msg = data.get("message","")
              if isinstance(msg, str) and msg.strip().startswith("{"):
                  try: findings = extract(json.loads(msg))
                  except: pass
          if not findings:
              for k in ("result","data","output"):
                  n = data.get(k)
                  if isinstance(n, dict):
                      findings = extract(n)
                      if findings: break

          if not findings:
              print("No violations — skipping PR creation"); sys.exit(0)

          repo       = os.environ["REPO"]
          run_id     = os.environ["RUN_ID"]
          base       = os.environ["BASE_BRANCH"]
          new_branch = f"regi/compliance-fixes-{run_id}"

          # Configure git and create local branch
          run_git('git config user.email "regi-bot@regiagents.com"')
          run_git('git config user.name "Regi Bot"')
          run_git(f"git checkout -b {new_branch}")

          # ── Find a file in the workspace by absolute or relative path ─────────
          def find_local(raw_path):
              # Try relative path first
              candidate = WORKSPACE / raw_path
              if candidate.exists(): return candidate
              # Search by filename across workspace
              name = Path(raw_path).name
              for p in sorted(WORKSPACE.rglob(name)):
                  if ".git" not in p.parts: return p
              return None

          # ── Apply fixes to actual source files ───────────────────────────────
          file_fixes = defaultdict(list)
          for fd in findings:
              raw   = str(fd.get("file","")).strip()
              fix   = str(fd.get("fix","")).strip()
              lines = str(fd.get("lines","")).strip()
              if raw and fix and lines: file_fixes[raw].append(fd)

          files_modified = []
          for raw_path, fds in file_fixes.items():
              local = find_local(raw_path)
              if not local:
                  print(f"Could not find {raw_path} in workspace"); continue
              file_lines = local.read_text(encoding="utf-8", errors="replace").split("\n")

              def get_start(fd):
                  try: return int(str(fd.get("lines","")).split("-")[0])
                  except: return 0

              # Detect comment style from file extension
              ext = local.suffix.lower()
              if ext in (".py", ".sh", ".rb", ".yml", ".yaml"): cc = "#"
              elif ext in (".js", ".ts", ".jsx", ".tsx", ".java", ".go", ".cs", ".cpp", ".c", ".kt"): cc = "//"
              else: cc = "#"

              applied = 0
              for fd in sorted(fds, key=get_start, reverse=True):
                  ls    = str(fd.get("lines",""))
                  issue = str(fd.get("issue","")).strip()
                  fix   = str(fd.get("fix","")).strip()
                  rule  = str(fd.get("rule","")).strip()
                  if not ls or not (issue or fix): continue
                  try:
                      parts = ls.split("-")
                      s = int(parts[0]) - 1
                      # Build comment block inserted ABOVE the offending lines
                      comment_lines = [
                          f"{cc} ============================================================",
                          f"{cc} COMPLIANCE FIX REQUIRED [{rule}]",
                      ]
                      if issue: comment_lines.append(f"{cc} Issue: {issue}")
                      if fix:
                          comment_lines.append(f"{cc} Suggested fix:")
                          for fix_line in fix.split("\n"):
                              comment_lines.append(f"{cc}   {fix_line}")
                      comment_lines.append(f"{cc} ============================================================")
                      file_lines[s:s] = comment_lines
                      applied += 1
                  except Exception as ex:
                      print(f"  Could not annotate lines {ls}: {ex}")

              if applied > 0:
                  local.write_text("\n".join(file_lines), encoding="utf-8")
                  rel = str(local.relative_to(WORKSPACE))
                  run_git(f'git add "{rel}"')
                  r = run_git(f'git commit -m "fix: apply {applied} PCI DSS fix(es) in {rel}"')
                  if r.returncode == 0:
                      files_modified.append(rel)
                      print(f"Patched {rel} ({applied} fix(es))")
                  else:
                      print(f"Commit failed for {rel}: {r.stderr}")

          # ── Commit COMPLIANCE_REPORT.md ───────────────────────────────────────
          rpt = ["# PCI DSS Compliance Violations", "",
                 f"**Repository:** `{repo}`  ", f"**Branch:** `{base}`  ",
                 f"**Run:** [{run_id}](https://github.com/{repo}/actions/runs/{run_id})  ",
                 f"**Violations found:** {len(findings)}",
                 f"**Files patched:** {len(files_modified)}", "", "---", "", "## Violations & Suggested Fixes", ""]
          for i, fd in enumerate(findings, 1):
              rpt += [f"### {i}. `{fd['rule']}`"]
              if fd["file"]: rpt += [f"**File:** `{fd['file']}`" + (f" lines {fd['lines']}" if fd["lines"] else "")]
              if fd["issue"]: rpt += [f"**Issue:** {fd['issue']}"]
              if fd["fix"]:   rpt += ["**Proposed fix:**", "", "```", fd["fix"], "```"]
              rpt += ["", "---", ""]
          rpt += ["", "> Generated by [Regi Compliance Scanner](https://www.regiagents.com)"]
          (WORKSPACE / "COMPLIANCE_REPORT.md").write_text("\n".join(rpt))
          run_git("git add COMPLIANCE_REPORT.md")
          run_git(f'git commit -m "chore: add PCI DSS compliance report ({len(findings)} violations)"')

          # ── Push branch ───────────────────────────────────────────────────────
          run_git(f"git push origin --delete {new_branch} 2>/dev/null || true")
          push = run_git(f"git push -u origin {new_branch}")
          if push.returncode != 0:
              print(f"Push failed: {push.stderr}"); sys.exit(1)
          print(f"Pushed {new_branch}")

          # ── Open PR ───────────────────────────────────────────────────────────
          patch_rows = "".join(f"| `{f}` | patched |\n" for f in files_modified)
          patched_note = ("\n\n**Files automatically patched:** " +
                          ", ".join(f"`{f}`" for f in files_modified)) if files_modified else ""
          pr_body = (
              f"## PCI DSS Compliance — {len(findings)} violation(s) found\n\n"
              f"This PR was automatically created by [Regi](https://www.regiagents.com) "
              f"after detecting compliance violations on `{base}`.{patched_note}\n\n"
              f"| Metric | Value |\n|---|---|\n"
              f"| Violations | {len(findings)} |\n"
              f"| Files patched | {len(files_modified)} |\n\n"
              + (f"### Patched files\n\n| File | Status |\n|---|---|\n{patch_rows}\n" if files_modified else "")
              + "Review `COMPLIANCE_REPORT.md` for the full violation list and any remaining manual fixes.\n\n"
              + f"> [View Actions run](https://github.com/{repo}/actions/runs/{run_id})"
          )
          pr = gh_api("POST", f"{repo}/pulls", {
              "title": f"fix: PCI DSS compliance — {len(findings)} violation(s) in {len(files_modified)} file(s)",
              "body": pr_body, "head": new_branch, "base": base,
          })
          url = pr.get("html_url","")
          if url: print(f"PR created: {url}")
          else:   print(f"PR response: {pr}")
          PYEOF
          python3 /tmp/create_pr.py
